name: E2E Test Generation

on:
  push:
    branches:
      - main
      - project/*
    paths:
      - 'documents/specs/**/*.md'
      - 'docs/specs/**/*.md'

jobs:
  generate-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Find changed spec files with @e2e auto tags
        id: find-specs
        run: |
          # 머지 커밋에서 변경된 스펙 파일 추출
          CHANGED_SPECS=$(git diff --name-only HEAD~1 HEAD -- 'documents/specs/**/*.md' 'docs/specs/**/*.md')

          if [ -z "$CHANGED_SPECS" ]; then
            echo "No spec files changed"
            echo "has_specs=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # @e2e auto 태그가 있는 파일만 필터링
          E2E_SPECS=""
          for spec in $CHANGED_SPECS; do
            if [ -f "$spec" ] && grep -q "@e2e auto" "$spec"; then
              E2E_SPECS="$E2E_SPECS $spec"
            fi
          done

          if [ -z "$E2E_SPECS" ]; then
            echo "No spec files with @e2e auto tags"
            echo "has_specs=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found specs with @e2e auto: $E2E_SPECS"
          echo "has_specs=true" >> $GITHUB_OUTPUT
          echo "spec_files=$E2E_SPECS" >> $GITHUB_OUTPUT

      - name: Generate E2E tests with Claude Code
        if: steps.find-specs.outputs.has_specs == 'true'
        uses: musinsa/workflows/claude-code-review@claude-code-review/v1.0.4
        with:
          review_language: 'Korean'
          project_guide_path: 'CLAUDE.md'
          custom_prompt_addition: |
            다음 스펙 파일들에 대해 E2E 테스트를 생성해주세요:
            ${{ steps.find-specs.outputs.spec_files }}

            각 스펙 파일에 대해:
            1. .claude/agents/spec-parser.md 규칙으로 @e2e auto TC를 파싱
            2. .claude/agents/e2e-test-writer.md 규칙으로 Playwright 테스트 생성
            3. e2e/ 디렉토리에 .spec.ts 파일로 저장
            4. import는 반드시 './base'에서 하세요
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_1 }}
          claude_code_oauth_token_fallback: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          github_token: ${{ github.token }}

      - name: Check for generated files
        if: steps.find-specs.outputs.has_specs == 'true'
        id: check-generated
        run: |
          # 새로 생성된 e2e 파일 확인
          NEW_FILES=$(git diff --name-only -- 'e2e/*.spec.ts')
          UNTRACKED=$(git ls-files --others --exclude-standard -- 'e2e/*.spec.ts')
          ALL_FILES="$NEW_FILES $UNTRACKED"

          if [ -z "$(echo "$ALL_FILES" | tr -d ' ')" ]; then
            echo "No E2E files generated"
            echo "has_files=false" >> $GITHUB_OUTPUT
          else
            echo "Generated E2E files: $ALL_FILES"
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "generated_files=$ALL_FILES" >> $GITHUB_OUTPUT
          fi

      - name: Commit generated E2E tests
        if: steps.check-generated.outputs.has_files == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/*.spec.ts
          git commit -m "test: auto-generate E2E tests from spec changes

          Generated by E2E Test Generation workflow.
          Source specs: ${{ steps.find-specs.outputs.spec_files }}

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push

      - name: Summary
        if: always() && steps.find-specs.outputs.has_specs == 'true'
        run: |
          echo "## E2E Test Generation Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Spec files" >> $GITHUB_STEP_SUMMARY
          for spec in ${{ steps.find-specs.outputs.spec_files }}; do
            echo "- \`$spec\`" >> $GITHUB_STEP_SUMMARY
          done
          if [ "${{ steps.check-generated.outputs.has_files }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Generated files" >> $GITHUB_STEP_SUMMARY
            for f in ${{ steps.check-generated.outputs.generated_files }}; do
              echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Auto-committed to \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No E2E files generated." >> $GITHUB_STEP_SUMMARY
          fi
