name: Test Scenario Document Generation

on:
  push:
    branches:
      - main
      - project/*
    paths:
      - 'documents/specs/**/*.md'
      - 'docs/specs/**/*.md'

jobs:
  generate-test-scenario:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GH_TOKEN }}

      - name: Find changed spec files with @e2e tags
        id: find-specs
        run: |
          CHANGED_SPECS=$(git diff --name-only HEAD~1 HEAD -- 'documents/specs/**/*.md' 'docs/specs/**/*.md')

          if [ -z "$CHANGED_SPECS" ]; then
            echo "No spec files changed"
            echo "has_specs=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # @e2e auto 또는 @e2e manual 태그가 있는 파일만 필터링
          E2E_SPECS=""
          for spec in $CHANGED_SPECS; do
            if [ -f "$spec" ] && grep -q "@e2e" "$spec"; then
              E2E_SPECS="$E2E_SPECS $spec"
            fi
          done

          if [ -z "$E2E_SPECS" ]; then
            echo "No spec files with @e2e tags"
            echo "has_specs=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found specs: $E2E_SPECS"
          echo "has_specs=true" >> $GITHUB_OUTPUT
          echo "spec_files=$E2E_SPECS" >> $GITHUB_OUTPUT

      - name: Generate test scenario documents with Claude Code
        if: steps.find-specs.outputs.has_specs == 'true'
        uses: musinsa/workflows/claude-code-review@claude-code-review/v1.0.4
        with:
          review_language: 'Korean'
          project_guide_path: 'CLAUDE.md'
          custom_prompt_addition: |
            다음 스펙 파일들에 대해 QA 테스트 시나리오 문서를 생성해주세요:
            ${{ steps.find-specs.outputs.spec_files }}

            각 스펙 파일에 대해:
            1. commands/generate-test-scenario.md 규칙을 따라 실행
            2. @e2e auto TC → "자동화 대상 🤖" 표시
            3. @e2e manual TC → "수동 QA 👋" 표시 + 사유 포함
            4. @태그를 사람이 실행할 수 있는 절차로 변환
            5. Then 절을 체크리스트(- [ ])로 변환
            6. documents/test-scenarios/ 디렉토리에 .md 파일로 저장
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_1 }}
          claude_code_oauth_token_fallback: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          github_token: ${{ github.token }}

      - name: Check for generated files
        if: steps.find-specs.outputs.has_specs == 'true'
        id: check-generated
        run: |
          NEW_FILES=$(git diff --name-only -- 'documents/test-scenarios/*.md')
          UNTRACKED=$(git ls-files --others --exclude-standard -- 'documents/test-scenarios/*.md')
          ALL_FILES="$NEW_FILES $UNTRACKED"

          if [ -z "$(echo "$ALL_FILES" | tr -d ' ')" ]; then
            echo "has_files=false" >> $GITHUB_OUTPUT
          else
            echo "Generated: $ALL_FILES"
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "generated_files=$ALL_FILES" >> $GITHUB_OUTPUT
          fi

      - name: Commit generated test scenarios
        if: steps.check-generated.outputs.has_files == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add documents/test-scenarios/*.md
          git commit -m "docs: auto-generate test scenario documents from spec changes

          Generated by Test Scenario Document Generation workflow.
          Source specs: ${{ steps.find-specs.outputs.spec_files }}

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push

      - name: Summary
        if: always() && steps.find-specs.outputs.has_specs == 'true'
        run: |
          echo "## Test Scenario Document Generation Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Spec files" >> $GITHUB_STEP_SUMMARY
          for spec in ${{ steps.find-specs.outputs.spec_files }}; do
            echo "- \`$spec\`" >> $GITHUB_STEP_SUMMARY
          done
          if [ "${{ steps.check-generated.outputs.has_files }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Generated test scenario documents" >> $GITHUB_STEP_SUMMARY
            for f in ${{ steps.check-generated.outputs.generated_files }}; do
              echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Auto-committed to \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No test scenario documents generated." >> $GITHUB_STEP_SUMMARY
          fi
