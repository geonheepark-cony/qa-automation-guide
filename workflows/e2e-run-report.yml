name: E2E Test Run & Report

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths:
      - 'e2e/**/*.spec.ts'
      - 'src/**/*.tsx'
      - 'src/**/*.ts'

jobs:
  e2e-test:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: e2e
        continue-on-error: true
        env:
          CI: true
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          npx playwright test --reporter=json > e2e-report.json 2>&1 || true

          # 결과 파싱
          TOTAL=$(jq '.stats.expected + .stats.unexpected + .stats.skipped' e2e-report.json 2>/dev/null || echo 0)
          PASSED=$(jq '.stats.expected' e2e-report.json 2>/dev/null || echo 0)
          FAILED=$(jq '.stats.unexpected' e2e-report.json 2>/dev/null || echo 0)
          SKIPPED=$(jq '.stats.skipped' e2e-report.json 2>/dev/null || echo 0)
          DURATION=$(jq '.stats.duration' e2e-report.json 2>/dev/null || echo 0)
          DURATION_SEC=$((DURATION / 1000))

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "duration=${DURATION_SEC}s" >> $GITHUB_OUTPUT

          if [ "$FAILED" -gt 0 ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.e2e.outputs.status }}';
            const total = '${{ steps.e2e.outputs.total }}';
            const passed = '${{ steps.e2e.outputs.passed }}';
            const failed = '${{ steps.e2e.outputs.failed }}';
            const skipped = '${{ steps.e2e.outputs.skipped }}';
            const duration = '${{ steps.e2e.outputs.duration }}';
            const icon = status === 'success' ? '✅' : '❌';

            let body = `## ${icon} E2E 테스트 결과\n\n`;
            body += `| 항목 | 결과 |\n|------|------|\n`;
            body += `| 전체 | ${total}개 |\n`;
            body += `| 통과 | ${passed}개 |\n`;
            body += `| 실패 | ${failed}개 |\n`;
            body += `| 건너뜀 | ${skipped}개 |\n`;
            body += `| 소요 시간 | ${duration} |\n`;

            if (status === 'failure') {
              body += `\n### 실패한 테스트\n`;
              body += `\n[상세 결과 확인](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;
            }

            body += `\n---\n🤖 Generated by E2E Test Run workflow`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_E2E_WEBHOOK_URL }}
        run: |
          # Slack Webhook URL이 설정되지 않으면 건너뜀
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_E2E_WEBHOOK_URL not set, skipping Slack notification"
            exit 0
          fi

          STATUS="${{ steps.e2e.outputs.status }}"
          PASSED="${{ steps.e2e.outputs.passed }}"
          FAILED="${{ steps.e2e.outputs.failed }}"
          SKIPPED="${{ steps.e2e.outputs.skipped }}"
          DURATION="${{ steps.e2e.outputs.duration }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$STATUS" = "success" ]; then
            EMOJI=":white_check_mark:"
            COLOR="#36a64f"
            STATUS_TEXT="전체 통과"
          else
            EMOJI=":x:"
            COLOR="#dc3545"
            STATUS_TEXT="실패 ${FAILED}건"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"blocks\": [
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"${EMOJI} *E2E 테스트 ${STATUS_TEXT}*\n<${PR_URL}|${PR_TITLE}> by ${PR_AUTHOR}\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"fields\": [
                      { \"type\": \"mrkdwn\", \"text\": \"*통과:* ${PASSED}개\" },
                      { \"type\": \"mrkdwn\", \"text\": \"*실패:* ${FAILED}개\" },
                      { \"type\": \"mrkdwn\", \"text\": \"*건너뜀:* ${SKIPPED}개\" },
                      { \"type\": \"mrkdwn\", \"text\": \"*소요:* ${DURATION}\" }
                    ]
                  },
                  {
                    \"type\": \"actions\",
                    \"elements\": [{
                      \"type\": \"button\",
                      \"text\": { \"type\": \"plain_text\", \"text\": \"상세 결과\" },
                      \"url\": \"${RUN_URL}\"
                    }]
                  }
                ]
              }]
            }"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: |
            e2e-report.json
            e2e-results/
            playwright-report/
          retention-days: 7
